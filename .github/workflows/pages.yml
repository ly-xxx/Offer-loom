name: Deploy Web Demo To GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate Demo Fixtures
        run: node scripts/validate-demo-api.mjs

      - name: Install Dependencies
        run: npm ci

      - name: Build Web
        run: npm run build:web

      - name: Configure Demo Runtime
        run: |
          cat > web/dist/runtime-config.json <<'EOF'
          {
            "apiBaseUrl": ".",
            "wsBaseUrl": ".",
            "demoMode": true
          }
          EOF

      - name: Verify Runtime Config
        run: |
          node -e "const fs=require('fs'); const conf=JSON.parse(fs.readFileSync('web/dist/runtime-config.json','utf8')); if(conf.demoMode!==true){throw new Error('demoMode must be true for Pages demo build')} console.log('runtime-config ok')"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy To GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
